name: Global App Keep-Alive
on:
  schedule:
    - cron: '0 */12 * * *' # Runs exactly every 12 hours
  workflow_dispatch:      # Allows you to click "Run workflow" manually in GitHub Actions

jobs:
  ping-apps:
    runs-on: ubuntu-latest
    steps:
      - name: Send Wake-up Pings
        run: |
          # Streamlit Apps
          curl -s https://ze-video-downloader.streamlit.app > /dev/null
          curl -s https://ze-matrix.streamlit.app > /dev/null
          curl -s https://nmaptest.streamlit.app > /dev/null
          curl -s https://ciphershield.streamlit.app > /dev/null
          curl -s https://logoscope.streamlit.app > /dev/null
          curl -s https://zequiz.streamlit.app > /dev/null
          curl -s https://ze-base.streamlit.app > /dev/null
          
          # Netlify Apps (Optional but good to keep warm)
          curl -s https://zarduino.netlify.app > /dev/null
          curl -s https://amakarita.netlify.app > /dev/null
          curl -s https://zememory.netlify.app > /dev/null
          
          echo "All portfolio projects pinged successfully at $(date)"
