name: Bulletproof App Heartbeat
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Mimic Real Browser Visit
        run: |
          APPS=(
            "https://ze-video-downloader.streamlit.app"
            "https://ze-matrix.streamlit.app"
            "https://nmaptest.streamlit.app"
            "https://ciphershield.streamlit.app"
            "https://logoscope.streamlit.app"
            "https://zequiz.streamlit.app"
            "https://ze-base.streamlit.app"
          )

          for url in "${APPS[@]}"; do
            echo "Heartbeat for $url..."
            # -b and -c handle cookies (Streamlit needs this)
            # --max-redirs 5 prevents the infinite loop crash
            # -sL runs it silently but follows redirects properly
            curl -sL --max-redirs 5 --connect-timeout 10 \
                 -b cookies.txt -c cookies.txt \
                 -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
                 "$url" > /dev/null
            
            # Clean up cookies for the next app
            rm -f cookies.txt
          done
          echo "All heartbeats sent successfully."
