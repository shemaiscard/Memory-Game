name: Bulletproof App Heartbeat
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Wake Apps With Real Browser
        run: |
          python - <<'EOF'
          from playwright.sync_api import sync_playwright
          import time

          APPS = [
            "https://ze-video-downloader.streamlit.app",
            "https://ze-matrix.streamlit.app",
            "https://nmaptest.streamlit.app",
            "https://smart-room-iot.streamlit.app",
            "https://ciphershield.streamlit.app",
            "https://logoscope.streamlit.app",
            "https://zequiz.streamlit.app",
            "https://digital-wallet.streamlit.app",
            "https://ze-base.streamlit.app",
          ]

          with sync_playwright() as p:
            browser = p.chromium.launch()
            for url in APPS:
              print(f"Waking {url}...")
              try:
                page = browser.new_page()
                page.goto(url, wait_until="networkidle", timeout=60000)
                time.sleep(5)  # Let the app fully initialize
                page.close()
                print(f"  Done: {url}")
              except Exception as e:
                print(f"  Failed: {url} — {e}")
            browser.close()
          print("All heartbeats sent.")
          EOF

